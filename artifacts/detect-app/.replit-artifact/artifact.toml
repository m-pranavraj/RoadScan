kind = "web"
previewPath = "/"
title = "RoadScan — Pothole & Litter Detection"
version = "1.0.0"
id = "artifacts/detect-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20321

[services.development]
run = "pnpm --filter @workspace/detect-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/detect-app", "run", "build" ]
publicDir = "artifacts/detect-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20321"
BASE_PATH = "/"
